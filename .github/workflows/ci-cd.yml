name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pylint flake8 mypy pytest pytest-cov

      - name: Format check with Black
        run: black --check src/ tests/ api.py
        continue-on-error: true

      - name: Lint with Pylint
        run: |
          pylint src/**/*.py api.py --fail-under=7.0
        continue-on-error: true

      - name: Lint with Flake8
        run: flake8 src/ api.py --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Type check with mypy
        run: mypy src/ api.py --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  build-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: smart-marketing-assistant:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
