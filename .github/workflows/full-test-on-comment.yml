name: Full Test on Comment

on:
  issue_comment:
    types: [created]

jobs:
  run-full-tests:
    if: >-
      github.event.comment.body == 'full test' &&
      (github.event.issue.pull_request != null || contains(github.event.issue.html_url, '/pull/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pylint flake8 mypy pytest pytest-cov
      - name: Run full test suite
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

  dummy-check:
    if: >-
      github.event.comment.body == 'full test' &&
      (github.event.issue.pull_request != null || contains(github.event.issue.html_url, '/pull/'))
    runs-on: ubuntu-latest
    steps:
      - name: Dummy step
        run: echo "This is a dummy check that runs only on 'full test' comment!"
